<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Realtime API Monitor</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
  </head>
  <body>
    <header>
      <h1>Realtime API Monitor</h1>
      <div id="stats">
        <div><span id="total">0</span> total</div>
        <div><span id="errors">0</span> errors</div>
        <div>P50: <span id="p50">0</span> ms · P95: <span id="p95">0</span> ms</div>
      </div>
      <div id="filters">
        <input id="search" placeholder="Search URL, UA, IP" />
        <select id="method">
          <option value="">Method</option>
          <option>GET</option>
          <option>POST</option>
          <option>PUT</option>
          <option>PATCH</option>
          <option>DELETE</option>
        </select>
        <select id="status">
          <option value="">Status</option>
          <option>200</option>
          <option>201</option>
          <option>400</option>
          <option>401</option>
          <option>403</option>
          <option>404</option>
          <option>500</option>
          <option>502</option>
        </select>
        <button id="apply">Apply</button>
      </div>
    </header>
    <main>
      <section class="cards">
        <canvas id="trafficChart"></canvas>
        <canvas id="statusChart"></canvas>
        <canvas id="latencyChart"></canvas>
      </section>
      <section>
        <table>
          <thead>
            <tr>
              <th>Time</th>
              <th>Method</th>
              <th>URL</th>
              <th>Status</th>
              <th>Latency</th>
              <th>IP</th>
              <th>UA</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
  </html>
